<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabalho 02 - Visualização de Dados - 2026.2 - IC/UFF</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <header>
    <h1>Lucro de Pedidos de e-Commerce</h1>
  </header>

  <div class="filters">
    <label>
      Fonte de Marketing:
      <select id="traffic-filter">
        <option value="">Todas</option>
      </select>
    </label>
  </div>

  <main class="dashboard">

    <section class="chart-panel">
      <h2>Por trimestre</h2>
      <svg id="time-chart"></svg>
    </section>

    <section class="chart-panel">
      <h2>Por Categoria de produto</h2>
      <svg id="category-chart" width="900" height="400"></svg>
    </section>

    <section class="chart-panel country-panel">
      <h2>Por País</h2>
      <svg id="country-chart" width="900" height="400"></svg>
    </section>


  </main>

  <div id="tooltip"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
