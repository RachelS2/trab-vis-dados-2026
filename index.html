<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabalho 02 - Visualização de Dados - 2026.2 - IC/UFF</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <header>
    <h1>Lucro de Pedidos de e-Commerce</h1>
  </header>

  <div class="filters">
    <label>
      Fonte de Marketing:
      <select id="traffic-filter">
        <option value="">Todas</option>
      </select>
    </label>
  </div>

  <main class="dashboard">

    <section class="chart-panel">
      <h2>Por trimestre</h2>
      <svg id="time-chart"></svg>
    </section>

    <section class="chart-panel">
      <h2>Por Categoria de produto</h2>
      <svg id="category-chart"></svg>
    </section>

    <section class="country-row">
      <div class="chart-panel country-panel">
        <h2>Por País</h2>
        <svg id="country-chart"></svg>
      </div>

      <aside id="insights-panel" class="chart-panel insights-panel">
        <h2>Insights</h2>

        <div class="insights-columns">
          <section class="insights-section">
            <h3>Filtros ativos</h3>
            <ul id="active-filters-list" class="insights-list"></ul>
          </section>

          <section class="insights-section">
            <h3>Maior lucro</h3>
            <ul id="profit-insights-list" class="insights-list"></ul>
          </section>
        </div>
      </aside>
    </section>


  </main>

  <div id="tooltip"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
